<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 관광데이터 활용 공모전</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../src/css/nav.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0e1520;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
        }

        .contest-body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 24px 0;
        }

        /* 배경 그라디언트 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(212, 168, 67, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(74, 124, 111, 0.06) 0%, transparent 55%);
            pointer-events: none;
        }

        .poster-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 540px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                0 24px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(212, 168, 67, 0.2);
        }

        .poster-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 포스터 위 레이블 */
        .poster-label {
            position: relative;
            z-index: 1;
            text-align: center;
            margin-bottom: 20px;
        }

        .poster-label-title {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 포스터 아래 링크 */
        .poster-actions {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .poster-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 11px 22px;
            border-radius: 100px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .poster-btn-primary {
            background: #d4a843;
            color: #1a1208;
        }

        .poster-btn-primary:hover {
            background: #e0b84a;
            transform: translateY(-1px);
        }

        .poster-btn-ghost {
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .poster-btn-ghost:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        /* 공모 정보 요약 */
        .info-strip {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 0;
            margin-top: 28px;
            width: 100%;
            max-width: 540px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(212, 168, 67, 0.2);
        }

        .info-strip-item {
            flex: 1;
            padding: 14px 12px;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            border-right: 1px solid rgba(212, 168, 67, 0.15);
        }

        .info-strip-item:last-child {
            border-right: none;
        }

        .info-strip-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-strip-value {
            font-size: 13px;
            font-weight: 700;
            color: #f0d080;
        }

        @media (max-width: 480px) {
            .contest-body {
                padding: 28px 16px 0;
            }

            .poster-wrap {
                border-radius: 14px;
            }

            .info-strip-item {
                padding: 12px 8px;
            }

            .info-strip-value {
                font-size: 11px;
            }
        }
    </style>
</head>

<body>

    <div class="contest-body">

        <div class="poster-label">
            <div class="poster-label-title">Competition Poster</div>
        </div>

        <div class="poster-wrap">
            <img src="poster.png" alt="2026 관광데이터 활용 공모전 포스터" />
        </div>

        <div class="info-strip">
            <div class="info-strip-item">
                <div class="info-strip-label">접수 기간</div>
                <div class="info-strip-value">3.30 – 5.6</div>
            </div>
            <div class="info-strip-item">
                <div class="info-strip-label">부문</div>
                <div class="info-strip-value">웹·앱 개발</div>
            </div>
            <div class="info-strip-item">
                <div class="info-strip-label">대상 상금</div>
                <div class="info-strip-value">1,000만원</div>
            </div>
            <div class="info-strip-item">
                <div class="info-strip-label">문의</div>
                <div class="info-strip-value" style="font-size:10px;letter-spacing:-0.3px">stunning.kr</div>
            </div>
        </div>

        <div class="poster-actions">
            <a href="mailto:gongmo@stunning.kr" class="poster-btn poster-btn-primary">
                ✉️ 문의하기
            </a>
            <a href="/" class="poster-btn poster-btn-ghost">
                🗓 데모 보러가기
            </a>
        </div>

    </div>

    <script src="../src/js/nav.js"></script>
</body>

</html>
